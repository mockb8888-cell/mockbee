<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Achievements - MockBee</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <link href="https://api.fontshare.com/v2/css?f[]=satoshi@900,700,500,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --cream-bg: #FFFFFF;
            --gold: #D8C4B6;
            --navy: #1A1A1A;
        }

        body {
            font-family: Satoshi, sans-serif;
            background: #FFFFFF;
            padding: 20px 30px;
            color: #1A1A1A;
        }

        .badge-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 15px;
            width: 100%;
            margin-top: 10px;
        }

        .badge-card {
            background: #FFF;
            border: 1px solid #CCC; /* Slightly darker border for better visibility */
            padding: 20px 15px;
            border-radius: 16px;
            text-align: center;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            min-height: 160px;
        }

        .badge-card.unlocked {
            background: var(--navy);
            color: #FFF;
            border-color: var(--navy);
            box-shadow: 0 8px 25px rgba(0,0,0,0.12);
        }

        .badge-card i {
            font-size: 1.6rem;
            color: #EEE;
            transition: all 0.3s;
            margin-bottom: 12px;
        }

        .badge-card.unlocked i {
            color: var(--gold);
            filter: drop-shadow(0 0 6px rgba(216, 196, 182, 0.5));
            font-size: 1.8rem;
        }

        .badge-card.unlocked h3 {
            color: var(--gold);
        }

        .badge-card:hover {
            transform: translateY(-5px) scale(1.04);
            border-color: var(--gold);
        }

        /* Shiny Layer Effect */
        .badge-card.unlocked::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -150%;
            width: 200%;
            height: 200%;
            background: linear-gradient(
                45deg,
                rgba(255,255,255,0) 0%,
                rgba(255,255,255,0) 45%,
                rgba(255,255,255,0.2) 50%,
                rgba(255,255,255,0) 55%,
                rgba(255,255,255,0) 100%
            );
            transform: rotate(45deg);
            transition: all 0.6s;
            pointer-events: none;
        }

        .badge-card.unlocked:hover::after {
            left: 100%;
            transition: all 0.8s ease;
        }

        .badge-card h3 {
            font-size: 0.95rem;
            margin-bottom: 5px;
            font-weight: 800;
        }

        .badge-card.unlocked p {
            color: rgba(255,255,255,0.7);
        }

        .badge-card p {
            font-size: 0.7rem;
            color: #4A4A4A;
            line-height: 1.4;
        }
    </style>
</head>

<body>
    <h2 style="font-family: 'Playfair Display', serif; font-size: 1.6rem; margin-bottom: 20px;">Career Milestones</h2>
    <div class="badge-grid" id="badge-container"></div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const badges = [
                { id: 'first_interview', name: 'The Take-Off', desc: 'Completed your first mock interview.', icon: 'fas fa-rocket' },
                { id: 'resume_master', name: 'ATS Master', desc: 'Successfully built your professional resume.', icon: 'fas fa-file-alt' },
                { id: 'pro_member', name: 'The Professional', desc: 'Unlocked the power of MockBee Pro or Elite.', icon: 'fas fa-crown' },
                { id: 'roadmap_explorer', name: 'Roadmap Explorer', desc: 'Navigated your personalized career path.', icon: 'fas fa-map-marked-alt' },
                { id: 'active_practitioner', name: 'Dedicated Learner', desc: 'Recorded 5+ professional activities.', icon: 'fas fa-clock' }
            ];

            const unlockedIds = JSON.parse(localStorage.getItem('mockbee_badges') || '[]');
            const container = document.getElementById('badge-container');

            badges.forEach(b => {
                const isUnlocked = unlockedIds.includes(b.id);
                const card = document.createElement('div');
                card.className = `badge-card ${isUnlocked ? 'unlocked' : ''}`;
                card.innerHTML = `
                    <i class="${b.icon}"></i>
                    <h3>${b.name}</h3>
                    <p>${b.desc}</p>
                `;
                container.appendChild(card);
            });
        });
    </script>
</body>

</html>
