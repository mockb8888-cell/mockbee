<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MockBee - 5-Minute Practice</title>
    <!-- Google Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link href="https://api.fontshare.com/v2/css?f[]=satoshi@900,700,500,300,400&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- CSS -->
    <link rel="stylesheet" href="css/quick-practice.css">
    <link rel="icon" type="image/png" href="images/bee_logo.png">
    <div class="practice-container mode-start-container">
        <div class="timer-visual-wrap">
            <div class="timer-visual"><i class="fas fa-bolt"></i></div>
            <div class="pulse-ring"></div>
        </div>
        
        <h1 class="premium-title">5-Minute Drill</h1>
        <p class="premium-subtitle">High-Intensity Technical Sprint</p>

        <div class="mode-stats">
            <div class="stat-box">
                <h4>Duration</h4>
                <p>300s</p>
            </div>
            <div class="stat-box">
                <h4>Questions</h4>
                <p>5 Fast</p>
            </div>
            <div class="stat-box">
                <h4>Level</h4>
                <p>Expert</p>
            </div>
        </div>

        <p class="mode-description">
            The clock starts the moment you enter. We've removed all distractions.<br>
            Focus on <strong>precision</strong>, <strong>speed</strong>, and <strong>technical accuracy</strong>.
        </p>

        <div class="mode-actions">
            <a href="interview.html?mode=5-min" class="btn-start-now">Begin Technical Sprint &nbsp; <i class="fas fa-chevron-right"></i></a>
            <br>
            <a href="quick-practice.html" class="btn-back-link">
                <i class="fas fa-arrow-left"></i> Change Mode
            </a>
        </div>
    </div>
</body>

</html>
