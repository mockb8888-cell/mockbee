<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MockBee - Rapid Revision</title>
    <!-- Google Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link href="https://api.fontshare.com/v2/css?f[]=satoshi@900,700,500,300,400&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- CSS -->
    <link rel="stylesheet" href="css/quick-practice.css">
    <link rel="icon" type="image/png" href="images/bee_logo.png">
    <div class="practice-container mode-start-container">
        <div class="timer-visual-wrap">
            <div class="timer-visual" style="background: #1a1a1a; color: #D8C4B6;"><i class="fas fa-fire"></i></div>
            <div class="pulse-ring" style="background: #D8C4B6;"></div>
        </div>
        
        <h1 class="premium-title">Rapid Revision</h1>
        <p class="premium-subtitle">Fast-Paced Concept Validation</p>

        <div class="mode-stats" style="background: rgba(216, 196, 182, 0.1); border-color: rgba(216, 196, 182, 0.2);">
            <div class="stat-box">
                <h4>Questions</h4>
                <p>5 Rapid</p>
            </div>
            <div class="stat-box">
                <h4>Speed</h4>
                <p>Lightning</p>
            </div>
            <div class="stat-box">
                <h4>Goal</h4>
                <p>Pattern Recall</p>
            </div>
        </div>

        <p class="mode-description">
            This mode is designed for immediate recall of technical syntax and foundational principles.
            Expect quick transitions and concise, accurate feedback.
        </p>

        <div class="mode-actions">
            <a href="interview.html?mode=rapid" class="btn-start-now" style="background: #1a1a1a; border: 1px solid #D8C4B6;">Ignite Session &nbsp; <i class="fas fa-fire"></i></a>
            <br>
            <a href="quick-practice.html" class="btn-back-link">
                <i class="fas fa-arrow-left"></i> Change Mode
            </a>
        </div>
    </div>
</body>

</html>
