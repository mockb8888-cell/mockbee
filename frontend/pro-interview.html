<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MockBee Pro - Premium AI Interview</title>
    <!-- Google Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <link href="https://api.fontshare.com/v2/css?f[]=satoshi@900,700,500,300,400&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- CSS -->
    <link rel="stylesheet" href="css/interview.css">
    <style>
        /* Pro-Specific Overrides - Matched to Home Page Theme */
        .pro-session-badge {
            display: inline-block !important;
            background-color: transparent !important;
            background-image: linear-gradient(to right, #000000 10%, #FFD700 50%, #000000 90%) !important;
            background-size: 200% auto !important;
            color: #000000 !important;
            -webkit-background-clip: text !important;
            background-clip: text !important;
            -webkit-text-fill-color: transparent !important;
            border: none !important;
            box-shadow: none !important;
            padding: 0 !important;
            letter-spacing: 2px !important;
            animation: textShine 2.5s linear infinite !important;
        }

        @keyframes textShine {
            0% { background-position: 200% center; }
            100% { background-position: -200% center; }
        }

        .mascot-interviewer__label {
            background: #000000 !important;
            color: #FFD700 !important;
            border: none !important;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2) !important;
            font-weight: 800 !important;
            font-family: 'Satoshi', sans-serif !important;
            -webkit-text-stroke: 0px !important;
        }

        .progress-bar-fill {
            background: var(--navy-dark) !important;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.2);
        }

        .progress-text {
            color: var(--navy-dark) !important;
        }

        /* Fix Exit Prep Button Width */
        .back-link {
            width: auto !important;
            height: 42px !important;
            border-radius: 50px !important;
            padding: 0 20px !important;
            gap: 10px;
            font-size: 0.95rem !important;
            font-weight: 700 !important;
            display: flex !important;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            white-space: nowrap;
        }

        /* Enforce default interview styles for overrides in case inline HTML conflicts */
        .header-center h1 {
            color: var(--navy-dark) !important;
            text-shadow: none !important;
        }

        .submit-btn {
            background: var(--navy-dark) !important;
            color: var(--gold-light) !important;
            border: 1px solid var(--gold) !important;
        }

        .submit-btn:hover {
            background: var(--white) !important;
            color: var(--navy-dark) !important;
        }

        .results-btn-container {
            border: 1.5px dashed var(--gold) !important;
            background: rgba(255, 255, 255, 0.3) !important;
            padding: 18px 28px !important;
            width: auto !important;
            min-width: 0 !important;
            display: inline-flex !important;
            align-self: flex-start !important;
            margin: 20px 0 20px 28% !important;
            border-radius: 20px !important;
        }

        .btn-view-results {
            background: #000000 !important;
            color: #ffffff !important;
            border: none !important;
            padding: 11px 22px !important;
            font-size: 0.95rem !important;
            border-radius: 40px !important;
        }

        .btn-view-results:hover {
            background: #222222 !important;
            color: #ffffff !important;
            box-shadow: none !important;
            transform: none !important;
        }

        .input-hint {
            color: var(--text-medium) !important;
            font-weight: 400 !important;
            font-size: 0.8rem !important;
        }
    </style>
</head>

<body>
    <div class="interview-page">
        <!-- Header -->
        <header class="interview-header">
            <div class="header-left">
                <a href="dashboard.html?page=roles" class="back-link">
                    <i class="fas fa-arrow-left"></i> Exit Prep
                </a>
            </div>

            <div class="header-center">
                <div class="role-badge">
                    <div class="role-info">
                        <span class="pro-session-badge">PRO MEMBER SESSION</span>
                        <h1 id="role-title">Loading Role...</h1>
                    </div>
                </div>
            </div>

            <div class="header-right" style="display: flex; gap: 15px; align-items: center;">
                <button id="quit-complete-btn" class="btn-action-light" style="display: none; padding: 5px 15px; font-size: 0.85rem; border-radius: 20px; border: none; background: #fff; font-weight: 600; cursor: pointer;">
                    <i class="fas fa-flag-checkered"></i> Quit & Complete
                </button>
                <div class="progress-container">
                    <div class="progress-text" style="color: #cbd5e1;"><span id="current-q">1</span> / <span
                            id="total-q">50</span></div>
                    <div class="progress-bar-bg" style="background: rgba(255,255,255,0.1);">
                        <div class="progress-bar-fill" style="width: 2%;"></div>
                    </div>
                </div>
            </div>
        </header>

        <div class="interview-main">
            <!-- Chat Area -->
            <main class="chat-container" id="chat-box">
                <!-- Messages dynamicly populating -->
            </main>

            <!-- Mascot Character Sidebar -->
            <aside class="mascot-sidebar">
                <div class="mascot-interviewer">
                    <div class="mascot-interviewer__label">PRO AI COACH</div>
                    <img src="images/ChatGPT Image Mar 30, 2026, 10_43_13 AM.png" alt="MockBee Mascot"
                        class="large-mascot">
                </div>
            </aside>
        </div>

        <!-- Input Area -->
        <footer class="input-area">
            <div class="input-container">
                <div class="input-wrapper">
                    <input type="text" id="user-input" placeholder="Give your professional answer..."
                        autocomplete="off">
                    <button class="mic-btn">
                        <i class="fas fa-microphone"></i>
                    </button>
                    <button id="submit-btn" class="submit-btn" style="background: var(--gold); color: #000;">
                        Submit &rarr;
                    </button>
                </div>
                <div class="input-hint" style="color: #94a3b8;">Full 50+ Question Session • Depth Focused</div>
            </div>
        </footer>
    </div>

    <!-- Scripts -->
    <script src="js/pro-questions.js"></script>
    <script src="js/config.js"></script>
    <script src="js/pro-interview.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const subscribedPlan = localStorage.getItem('mockbee_subscribed_plan');
            // 'pro' is the identifier for the Elite plan in mockbee
            if (subscribedPlan === 'pro') {
                const badge = document.querySelector('.pro-session-badge');
                if (badge) {
                    badge.textContent = 'ELITE MEMBER SESSION';
                    badge.style.setProperty('background-image', 'linear-gradient(to right, #000000 10%, #27AE60 50%, #000000 90%)', 'important');
                }
                const coachLabel = document.querySelector('.mascot-interviewer__label');
                if (coachLabel) {
                    coachLabel.textContent = 'ELITE AI COACH';
                    
                    // Add dynamic text color animation style for elite
                    const style = document.createElement('style');
                    style.textContent = `
                        @keyframes eliteTextColorPulse {
                            0% { color: #27AE60; }
                            50% { color: #58D68D; text-shadow: 0 0 10px rgba(39, 174, 96, 0.4); }
                            100% { color: #27AE60; }
                        }
                    `;
                    document.head.appendChild(style);
                    
                    coachLabel.style.setProperty('color', '#27AE60', 'important');
                    coachLabel.style.setProperty('animation', 'eliteTextColorPulse 2.5s infinite', 'important');
                }
            }
        });
    </script>
</body>
</html>
