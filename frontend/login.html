<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description"
        content="Login to MockBee - Practice with Realistic Mock Interviews & Get Hired with Confidence." />
    <title>Log In - MockBee</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700;900&family=Inter:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <link href="https://api.fontshare.com/v2/css?f[]=satoshi@900,700,500,300,400&display=swap" rel="stylesheet">

    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />

    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/login.css" />
    <style>
        .btn-back-floating {
            position: absolute;
            top: 40px;
            left: 40px;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            text-decoration: none;
            color: #1A1A1A;
            font-weight: 700;
            font-size: 0.9rem;
            background: #FFFFFF;
            padding: 12px 24px;
            border-radius: 50px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
            border: 1.5px solid #E9E4E2;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .btn-back-floating:hover {
            transform: scale(1.05);
            border-radius: 4px;
            border-color: #D8C4B6;
            color: #B09E93;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.12);
        }

        @media (max-width: 768px) {
            .btn-back-floating {
                top: 20px;
                left: 20px;
                padding: 8px 16px;
                font-size: 0.8rem;
            }
        }

        /* --- Login Error Message (Compact & Static) --- */
        .auth-form {
            position: relative;
            /* Anchor for absolute error box */
        }

        #login-error-msg {
            position: absolute;
            display: none; /* Toggled by JS */
            align-items: center;
            justify-content: center;
            gap: 6px;
            background: #FFF5F5;
            border: 1px solid #FFCDD2;
            border-radius: 6px;
            color: #D32F2F;
            font-size: 0.72rem;
            font-weight: 600;
            padding: 0 10px;
            /* Narrower and lowered slightly */
            bottom: 62px; 
            left: 5%;
            width: 90%;
            height: 28px;
            z-index: 10;
            margin: 0;
            pointer-events: none;
            animation: shake 0.4s ease both;
            box-sizing: border-box;
        }

        /* Reduce card height at top and bottom */
        .login-card {
            padding-top: 25px !important;
            padding-bottom: 25px !important;
        }

        .login-card__title {
            margin-bottom: 20px !important; /* Compact title area */
        }

        /* Move button down further for spacious layout */
        .btn-submit {
            margin-top: 30px !important;
        }

        #login-error-msg i {
            font-size: 0.8rem;
            flex-shrink: 0;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-3px); }
            40% { transform: translateX(3px); }
            60% { transform: translateX(-2px); }
            80% { transform: translateX(2px); }
        }

        /* Red border on invalid inputs */
        .form-input.input-error {
            border-color: #E53935 !important;
            box-shadow: 0 0 0 3px rgba(229, 57, 53, 0.15);
        }
    </style>
</head>

<body>

    <main>
        <!-- Back Button -->
        <a href="index.html" class="btn-back-floating">
            <i class="fas fa-arrow-left"></i> Back to Home
        </a>
        <!-- ===================== LOGIN SECTION ===================== -->
        <section class="login-section">
            <!-- Falling Blocks Background -->
            <ul class="bg-bubbles" aria-hidden="true">
                <li></li>
                <li></li>
                <li></li>
                <li></li>
                <li></li>
                <li></li>
                <li></li>
                <li></li>
                <li></li>
                <li></li>
                <li></li>
                <li></li>
                <li></li>
                <li></li>
                <li></li>
                <li></li>
                <li></li>
                <li></li>
                <li></li>
                <li></li>
            </ul>

            <!-- Restored Welcome Text (Minimal) -->
            <div class="welcome-minimal">
                <h1 class="welcome-minimal__title">Welcome back to MockBee!</h1>
                <p class="welcome-minimal__subtitle">The AI-Powered Mock Interview Platform designed for your success.
                </p>
            </div>

            <!-- Log In Card (Matching Image 1) -->
            <div class="login-card">
                <h2 class="login-card__title">Log In</h2>

                <!-- Log In Form -->
                <form class="auth-form" action="#" method="POST">
                    <div class="form-group">
                        <label for="email" class="form-label">Email Address or Username</label>
                        <input type="text" id="email" name="email" class="form-input" placeholder="john@example.com / Username"
                            required />
                    </div>

                    <div class="form-group password-group">
                        <label for="password" class="form-label">Password</label>
                        <div class="input-wrapper">
                            <input type="password" id="password" name="password" class="form-input"
                                placeholder="Password" required />
                            <i class="fas fa-eye toggle-password" id="togglePassword"></i>
                        </div>
                    </div>

                    <div class="form-options">
                        <label class="checkbox-wrap">
                            <input type="checkbox" id="remember" />
                            <span>Remember me</span>
                        </label>
                        <a href="#" class="forgot-link">Forgot password?</a>
                    </div>

                    <!-- Login Error Message -->
                    <div id="login-error-msg">
                        <i class="fas fa-exclamation-circle"></i>
                        <span></span>
                    </div>

                    <button type="submit" class="btn-submit">Log In</button>
                </form>

                <p class="auth-redirect">
                    Don't have an account? <a href="signup.html">Sign up</a>
                </p>

                <!-- Social Sign In Icons -->
                <div class="social-signin-wrap">
                    <span class="social-signin-label">Or sign in with</span>
                    <div class="social-icons-group">
                        <a href="#" class="social-icon google" title="Sign in with Google"><i
                                class="fab fa-google"></i></a>
                        <a href="#" class="social-icon github" title="Sign in with GitHub"><i
                                class="fab fa-github"></i></a>
                        <a href="#" class="social-icon facebook" title="Sign in with Facebook"><i
                                class="fab fa-facebook-f"></i></a>
                        <a href="#" class="social-icon linkedin" title="Sign in with LinkedIn"><i
                                class="fab fa-linkedin-in"></i></a>
                        <a href="#" class="social-icon twitter" title="Sign in with Twitter"><i
                                class="fab fa-twitter"></i></a>
                    </div>
                </div>

            </div>
        </section>

        <!-- Reset Password Modal -->
        <div id="resetModal" class="modal-overlay">
            <div class="modal-content">
                <span class="modal-close" id="closeResetModal">&times;</span>
                <h2 class="modal-title">Reset Password</h2>
                <p class="modal-subtitle">Enter your email and we'll send you a link to reset your password.</p>
                <div class="modal-form">
                    <input type="email" id="resetEmailInput" placeholder="Enter your email" />
                    <button id="submitResetBtn" class="btn-primary">Send Reset Link</button>
                </div>
                <p id="resetMessage" style="display:none; color: green; margin-top: 15px; font-weight: 500;"></p>
            </div>
        </div>
    </main>

    </main>

    <!-- Main JS -->
    <script src="js/main.js"></script>
    <script src="js/config.js"></script>
    <script src="js/login.js"></script>
</body>

</html>
