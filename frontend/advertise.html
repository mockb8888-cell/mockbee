<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Unlock MockBee Pro</title>
    <link href="https://api.fontshare.com/v2/css?f[]=satoshi@900,700,500,300,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <style>
        body { font-family: 'Satoshi', sans-serif; background: #fff; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; text-align: center; }
        .ad-container { max-width: 900px; padding: 20px; }
        .ad-badge { background: #F0E6DD; color: #5D4D42; padding: 5px 15px; border-radius: 50px; font-weight: 800; font-size: 0.7rem; text-transform: uppercase; margin-bottom: 20px; display: inline-block; }
        .ad-title { font-size: 3rem; font-weight: 900; margin-bottom: 20px; line-height: 1.1; }
        .ad-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 40px; }
        .ad-box { border: 1.5px solid #E9E4E2; padding: 30px 20px; border-radius: 20px; transition: all 0.3s; }
        .ad-box:hover { transform: translateY(-5px); border-color: #D8C4B6; }
        .ad-icon { font-size: 2.5rem; color: #B09E93; margin-bottom: 15px; }
        .btn-signup { background: #000; color: #fff; padding: 18px 45px; border-radius: 50px; text-decoration: none; font-weight: 800; font-size: 1.1rem; display: inline-flex; align-items: center; gap: 10px; }
    </style>
</head>

<body>
    <div class="ad-container">
        <div class="ad-badge">MockBee Pro Member</div>
        <h1 class="ad-title">Master Your Future with<br>MockBee Paid Version</h1>
        <div class="ad-grid">
            <div class="ad-box">
                <div class="ad-icon"><i class="fas fa-database"></i></div>
                <h3>500+ Questions</h3>
                <p>Expert questions from top companies.</p>
            </div>
            <div class="ad-box">
                <div class="ad-icon"><i class="fas fa-code"></i></div>
                <h3>16+ Roles</h3>
                <p>Tailored paths for IT roles.</p>
            </div>
            <div class="ad-box">
                <div class="ad-icon"><i class="fas fa-file-contract"></i></div>
                <h3>ATS Resumes</h3>
                <p>Pass the recruiter filters instantly.</p>
            </div>
        </div>
        <a href="signup.html" class="btn-signup">Sign Up To Access Now <i class="fas fa-rocket"></i></a>
    </div>
</body>

</html>
