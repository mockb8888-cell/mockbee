<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MockBee — Admin Panel</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root {
            --cream-bg: #F9F7F5;
            --cream-dark: #E9E4E2;
            --gold: #D8C4B6;
            --gold-dark: #B09E93;
            --navy: #1A1A1A;
            --navy-dark: #000000;
            --text-dark: #1A1A1A;
            --text-medium: #6B6B6B;
            --green: #27AE60;
            --red: #E53935;
            --yellow: #F2C94C;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--cream-bg);
            color: var(--text-dark);
            min-height: 100vh;
        }

        /* ── Top Bar ── */
        .admin-topbar {
            background: var(--navy);
            color: #fff;
            padding: 16px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
        }

        .admin-topbar .logo-area {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .admin-topbar .logo-area i {
            font-size: 1.5rem;
            color: var(--gold);
        }

        .admin-topbar .logo-area h1 {
            font-size: 1.2rem;
            font-weight: 800;
            letter-spacing: 0.5px;
        }

        .admin-topbar .logo-area h1 span {
            color: var(--gold);
        }

        .admin-topbar .admin-badge {
            background: rgba(216, 196, 182, 0.15);
            border: 1px solid rgba(216, 196, 182, 0.3);
            color: var(--gold);
            padding: 6px 18px;
            border-radius: 50px;
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }

        .admin-topbar .logout-btn {
            background: none;
            border: 1px solid rgba(255,255,255,0.2);
            color: #aaa;
            padding: 8px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 600;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .admin-topbar .logout-btn:hover {
            background: rgba(255,255,255,0.1);
            color: #fff;
            border-color: var(--gold);
        }

        /* ── Stats Row ── */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            padding: 30px 40px 10px;
        }

        .stat-card {
            background: #fff;
            padding: 24px;
            border-radius: 14px;
            border: 1px solid var(--cream-dark);
            display: flex;
            align-items: center;
            gap: 18px;
            transition: all 0.3s;
        }

        .stat-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.06);
            border-color: var(--gold);
        }

        .stat-card .stat-icon {
            width: 52px;
            height: 52px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
        }

        .stat-card .stat-icon.users { background: #EDE7F6; color: #7C4DFF; }
        .stat-card .stat-icon.sessions { background: #E8F5E9; color: #43A047; }
        .stat-card .stat-icon.avg { background: #FFF3E0; color: #FB8C00; }
        .stat-card .stat-icon.active { background: #E3F2FD; color: #1E88E5; }

        .stat-card .stat-text h3 {
            font-size: 1.6rem;
            font-weight: 800;
            line-height: 1;
            margin-bottom: 4px;
        }

        .stat-card .stat-text p {
            font-size: 0.78rem;
            color: var(--text-medium);
            font-weight: 500;
        }

        /* ── Tabs ── */
        .tab-bar {
            display: flex;
            gap: 4px;
            padding: 20px 40px 0;
        }

        .tab-btn {
            padding: 10px 28px;
            border: none;
            background: transparent;
            color: var(--text-medium);
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            border-bottom: 3px solid transparent;
            transition: all 0.3s;
        }

        .tab-btn:hover { color: var(--text-dark); }

        .tab-btn.active {
            color: var(--navy);
            border-bottom-color: var(--gold);
            font-weight: 700;
        }

        /* ── Table Container ── */
        .table-container {
            padding: 16px 40px 40px;
        }

        .table-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .table-header h2 {
            font-size: 1.1rem;
            font-weight: 800;
        }

        .search-box {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #fff;
            border: 1px solid var(--cream-dark);
            border-radius: 8px;
            padding: 8px 16px;
        }

        .search-box i { color: var(--text-medium); font-size: 0.85rem; }

        .search-box input {
            border: none;
            outline: none;
            font-size: 0.85rem;
            font-family: 'Inter', sans-serif;
            background: transparent;
            width: 220px;
        }

        .data-table {
            width: 100%;
            background: #fff;
            border-radius: 14px;
            overflow: hidden;
            border: 1px solid var(--cream-dark);
            border-collapse: collapse;
        }

        .data-table thead {
            background: var(--navy);
            color: #fff;
        }

        .data-table thead th {
            padding: 14px 20px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-align: left;
            white-space: nowrap;
        }

        .data-table tbody tr {
            border-bottom: 1px solid #f0eeec;
            transition: background 0.2s;
        }

        .data-table tbody tr:hover {
            background: rgba(216, 196, 182, 0.08);
        }

        .data-table tbody tr:last-child {
            border-bottom: none;
        }

        .data-table td {
            padding: 14px 20px;
            font-size: 0.82rem;
            color: var(--text-dark);
            white-space: nowrap;
        }

        .data-table td.email-col {
            font-weight: 600;
            color: var(--navy);
        }

        .score-badge {
            display: inline-block;
            padding: 4px 14px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 0.78rem;
        }

        .score-badge.high { background: #E8F5E9; color: #2E7D32; }
        .score-badge.mid { background: #FFF8E1; color: #F57F17; }
        .score-badge.low { background: #FFEBEE; color: #C62828; }
        .score-badge.na { background: #F5F5F5; color: #999; }

        .role-tag {
            background: rgba(216, 196, 182, 0.2);
            color: var(--navy);
            padding: 4px 12px;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .loading-msg {
            text-align: center;
            padding: 60px;
            color: var(--text-medium);
            font-size: 0.9rem;
        }

        .loading-msg i {
            font-size: 2rem;
            color: var(--gold);
            display: block;
            margin-bottom: 12px;
        }

        .empty-state {
            text-align: center;
            padding: 50px;
            color: var(--text-medium);
        }

        .refresh-btn {
            background: var(--gold);
            color: var(--navy);
            border: none;
            padding: 8px 20px;
            border-radius: 8px;
            font-weight: 700;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .refresh-btn:hover {
            background: var(--navy);
            color: var(--gold);
            transform: translateY(-1px);
        }

        .btn-action {
            background: none;
            border: none;
            cursor: pointer;
            padding: 8px;
            border-radius: 6px;
            transition: all 0.2s;
            font-size: 0.9rem;
        }
        .btn-action.delete { color: var(--red); }
        .btn-action.delete:hover { background: rgba(229, 57, 53, 0.1); }
        .btn-action.download { color: var(--navy); }
        .btn-action.download:hover { background: rgba(26, 26, 26, 0.1); }
        .btn-action.overview { color: var(--green); }
        .btn-action.overview:hover { background: rgba(39, 174, 96, 0.1); }

        @media (max-width: 900px) {
            .stats-row { grid-template-columns: repeat(2, 1fr); padding: 20px; }
            .table-container { padding: 16px 20px; }
            .admin-topbar { padding: 14px 20px; }
        }
    </style>
</head>
<body>

    <!-- Top Bar -->
    <div class="admin-topbar">
        <div class="logo-area">
            <i class="fas fa-shield-halved"></i>
            <h1>Mock<span>Bee</span> Admin</h1>
        </div>
        <span class="admin-badge"><i class="fas fa-lock" style="margin-right:6px"></i> Admin Access</span>
        <button class="logout-btn" id="admin-logout-btn">
            <i class="fas fa-right-from-bracket"></i> Logout
        </button>
    </div>

    <!-- Stats Row -->
    <div class="stats-row">
        <div class="stat-card">
            <div class="stat-icon users"><i class="fas fa-users"></i></div>
            <div class="stat-text">
                <h3 id="total-users">—</h3>
                <p>Total Users</p>
            </div>
        </div>
        <div class="stat-card">
            <div class="stat-icon sessions"><i class="fas fa-clipboard-check"></i></div>
            <div class="stat-text">
                <h3 id="total-sessions">—</h3>
                <p>Interview Sessions</p>
            </div>
        </div>
        <div class="stat-card">
            <div class="stat-icon avg"><i class="fas fa-chart-line"></i></div>
            <div class="stat-text">
                <h3 id="avg-score">—</h3>
                <p>Avg Score</p>
            </div>
        </div>
        <div class="stat-card">
            <div class="stat-icon active"><i class="fas fa-bolt"></i></div>
            <div class="stat-text">
                <h3 id="active-today">—</h3>
                <p>Unique Roles Used</p>
            </div>
        </div>
    </div>

    <!-- Tabs -->
    <div class="tab-bar">
        <button class="tab-btn active" data-tab="users"><i class="fas fa-users" style="margin-right:6px"></i> All Users</button>
        <button class="tab-btn" data-tab="sessions"><i class="fas fa-history" style="margin-right:6px"></i> All Sessions</button>
    </div>

    <!-- Users Table -->
    <div class="table-container" id="tab-users">
        <div class="table-header">
            <h2><i class="fas fa-user-group" style="color:var(--gold-dark);margin-right:8px"></i>Registered Users</h2>
            <div style="display:flex;gap:10px;align-items:center">
                <button class="refresh-btn" id="add-student-btn" style="background:var(--green);color:#fff;border:none;"><i class="fas fa-plus"></i> Add Student</button>
                <div class="search-box">
                    <i class="fas fa-search"></i>
                    <input type="text" id="search-users" placeholder="Search by email or name...">
                </div>
                <button class="refresh-btn" id="refresh-btn"><i class="fas fa-rotate"></i> Refresh</button>
            </div>
        </div>
        <div id="users-table-wrap">
            <div class="loading-msg"><i class="fas fa-spinner fa-spin"></i>Loading users...</div>
        </div>
    </div>

    <!-- Sessions Table -->
    <div class="table-container" id="tab-sessions" style="display:none">
        <div class="table-header">
            <h2><i class="fas fa-clipboard-list" style="color:var(--gold-dark);margin-right:8px"></i>Interview Sessions</h2>
            <div style="display:flex;gap:10px;align-items:center">
                <select id="filter-user-type" style="padding:8px 12px; border-radius:8px; border:1px solid var(--cream-dark); font-family:'Inter'; outline:none; font-size: 0.85rem; color: var(--text-dark);">
                    <option value="ALL">All Users</option>
                    <option value="PREMIUM">Students (Admin Created)</option>
                    <option value="PUBLIC">Public Users (Self Registered)</option>
                </select>
                <div class="search-box">
                    <i class="fas fa-search"></i>
                    <input type="text" id="search-sessions" placeholder="Search by email or role...">
                </div>
            </div>
        </div>
        <div id="sessions-table-wrap">
            <div class="loading-msg"><i class="fas fa-spinner fa-spin"></i>Loading sessions...</div>
        </div>
    </div>

    <!-- Report Overview Modal -->
    <div id="overview-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); z-index:1000; align-items:center; justify-content:center; backdrop-filter: blur(4px);">
        <div style="background:#fff; width:650px; max-height:85vh; border-radius:14px; padding:30px; overflow-y:auto; position:relative; box-shadow: 0 10px 40px rgba(0,0,0,0.2);">
            <button onclick="document.getElementById('overview-modal').style.display='none'" style="position:absolute; top:20px; right:20px; border:none; background:none; cursor:pointer; font-size:1.4rem; color:#666; transition: color 0.2s;"><i class="fas fa-times"></i></button>
            <h2 style="margin-bottom:20px; font-weight:800; font-size: 1.5rem; color: var(--navy);">Report Overview</h2>
            <div id="overview-content" style="font-size:0.95rem; line-height:1.6; color:var(--text-dark);"></div>
        </div>
    </div>

    <!-- Add Student Modal -->
    <div id="add-student-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); z-index:1000; align-items:center; justify-content:center; backdrop-filter: blur(4px);">
        <div style="background:#fff; width:450px; border-radius:14px; padding:30px; position:relative; box-shadow: 0 10px 40px rgba(0,0,0,0.2);">
            <button onclick="document.getElementById('add-student-modal').style.display='none'" style="position:absolute; top:20px; right:20px; border:none; background:none; cursor:pointer; font-size:1.4rem; color:#666;"><i class="fas fa-times"></i></button>
            <h2 style="margin-bottom:20px; font-weight:800; font-size: 1.5rem; color: var(--navy);">Add Student</h2>
            <form id="add-student-form">
                <div style="margin-bottom: 15px;">
                    <label style="display:block; margin-bottom:5px; font-weight:600; font-size:0.9rem;">Name</label>
                    <input type="text" id="student-name" required style="width:100%; padding:10px; border:1px solid #ddd; border-radius:8px; font-family:'Inter'; outline:none;">
                </div>
                <div style="margin-bottom: 15px;">
                    <label style="display:block; margin-bottom:5px; font-weight:600; font-size:0.9rem;">Email</label>
                    <input type="email" id="student-email" required style="width:100%; padding:10px; border:1px solid #ddd; border-radius:8px; font-family:'Inter'; outline:none;">
                </div>
                <div style="margin-bottom: 20px;">
                    <label style="display:block; margin-bottom:5px; font-weight:600; font-size:0.9rem;">Password</label>
                    <input type="text" id="student-password" required style="width:100%; padding:10px; border:1px solid #ddd; border-radius:8px; font-family:'Inter'; outline:none;">
                </div>
                <button type="submit" style="width:100%; background:var(--navy); color:#fff; padding:12px; border:none; border-radius:8px; font-weight:700; cursor:pointer;">Create Student Account</button>
            </form>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script>
        const ADMIN_KEY = 'mockb@urban';
        let allUsers = [];
        let allSessions = [];

        // ── Auth Check ──
        if (localStorage.getItem('mockbee_is_admin') !== 'true') {
            alert('Access Denied. Admin only.');
            window.location.href = 'login.html';
        }

        // ── Logout ──
        document.getElementById('admin-logout-btn').addEventListener('click', () => {
            localStorage.removeItem('mockbee_user_name');
            localStorage.removeItem('mockbee_user_email');
            localStorage.removeItem('mockbee_is_admin');
            window.location.href = 'login.html';
        });

        // ── Tabs ──
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                const tab = btn.getAttribute('data-tab');
                document.getElementById('tab-users').style.display = tab === 'users' ? 'block' : 'none';
                document.getElementById('tab-sessions').style.display = tab === 'sessions' ? 'block' : 'none';
            });
        });

        // ── Fetch Data ──
        function loadData() {
            // Fetch users
            fetch(`${API_BASE}/api/admin/users?key=${encodeURIComponent(ADMIN_KEY)}`)
                .then(r => r.json())
                .then(data => {
                    if (data.status === 'success') {
                        allUsers = data.users;
                        renderUsersTable(allUsers);
                        document.getElementById('total-users').textContent = allUsers.length;
                    }
                })
                .catch(err => {
                    document.getElementById('users-table-wrap').innerHTML = '<div class="empty-state">Failed to load users. Is the backend running?</div>';
                });

            // Fetch sessions
            fetch(`${API_BASE}/api/admin/sessions?key=${encodeURIComponent(ADMIN_KEY)}`)
                .then(r => r.json())
                .then(data => {
                    if (data.status === 'success') {
                        allSessions = data.sessions;
                        renderSessionsTable(allSessions);
                        document.getElementById('total-sessions').textContent = allSessions.length;

                        // Avg score
                        const scored = allSessions.filter(s => s.score);
                        if (scored.length > 0) {
                            const avg = Math.round(scored.reduce((a, s) => a + s.score, 0) / scored.length);
                            document.getElementById('avg-score').textContent = avg + '%';
                        } else {
                            document.getElementById('avg-score').textContent = '—';
                        }

                        // Unique roles
                        const roles = new Set(allSessions.map(s => s.role));
                        document.getElementById('active-today').textContent = roles.size;
                    }
                })
                .catch(err => {
                    document.getElementById('sessions-table-wrap').innerHTML = '<div class="empty-state">Failed to load sessions.</div>';
                });
        }

        // ── Render Users ──
        function renderUsersTable(users) {
            const wrap = document.getElementById('users-table-wrap');
            if (!users.length) {
                wrap.innerHTML = '<div class="empty-state">No registered users yet.</div>';
                return;
            }

            let html = `<table class="data-table">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Email</th>
                        <th>Name</th>
                        <th>Role</th>
                        <th>Created</th>
                        <th>Last Seen</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>`;

            users.forEach((u, i) => {
                const created = u.created_at ? new Date(u.created_at).toLocaleDateString() : '—';
                const lastSeen = u.last_seen ? new Date(u.last_seen).toLocaleDateString() : '—';
                html += `<tr>
                    <td>${i + 1}</td>
                    <td class="email-col">${u.email}</td>
                    <td>${u.name || '—'}</td>
                    <td><span class="role-tag">${u.role || 'PUBLIC'}</span></td>
                    <td>${created}</td>
                    <td>${lastSeen}</td>
                    <td>
                        <button class="btn-action delete" title="Delete User" onclick="deleteUser('${u.email}')">
                            <i class="fas fa-trash"></i>
                        </button>
                    </td>
                </tr>`;
            });

            html += '</tbody></table>';
            wrap.innerHTML = html;
        }

        // ── Render Sessions ──
        function renderSessionsTable(sessions) {
            const wrap = document.getElementById('sessions-table-wrap');
            if (!sessions.length) {
                wrap.innerHTML = '<div class="empty-state">No interview sessions recorded yet.</div>';
                return;
            }

            let html = `<table class="data-table">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>User Email</th>
                        <th>Role (Interview)</th>
                        <th>User Type</th>
                        <th>Score</th>
                        <th>Date</th>
                        <th>Saved At</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>`;

            sessions.forEach((s, i) => {
                const score = s.score || s.score === 0 ? s.score : null;
                let badgeClass = 'na';
                let badgeText = '—';
                if (score !== null) {
                    badgeText = score + '%';
                    if (score >= 75) badgeClass = 'high';
                    else if (score >= 50) badgeClass = 'mid';
                    else badgeClass = 'low';
                }

                const date = s.date || '—';
                const savedAt = s.saved_at ? new Date(s.saved_at).toLocaleString() : '—';

                html += `<tr>
                    <td>${i + 1}</td>
                    <td class="email-col">${s.user_email || '—'}</td>
                    <td><span class="role-tag">${s.role || '—'}</span></td>
                    <td><span class="role-tag" style="${s.user_role === 'PREMIUM' ? 'background:#E8F5E9; color:#2E7D32' : ''}">${s.user_role === 'PREMIUM' ? 'Student' : 'Public'}</span></td>
                    <td><span class="score-badge ${badgeClass}">${badgeText}</span></td>
                    <td>${date}</td>
                    <td>${savedAt}</td>
                    <td>
                        <button class="btn-action overview" title="Report Overview" onclick="showOverview('${s.id}')">
                            <i class="fas fa-eye"></i>
                        </button>
                        <button class="btn-action download" title="Download PDF" onclick="downloadReportAsPDF('${s.id}')">
                            <i class="fas fa-file-pdf"></i>
                        </button>
                        <button class="btn-action delete" title="Delete Session" onclick="deleteSession('${s.id}')">
                            <i class="fas fa-trash"></i>
                        </button>
                    </td>
                </tr>`;
            });

            html += '</tbody></table>';
            wrap.innerHTML = html;
        }

        // ── Search & Filters ──
        document.getElementById('search-users').addEventListener('input', (e) => {
            const q = e.target.value.toLowerCase();
            const filtered = allUsers.filter(u =>
                (u.email || '').toLowerCase().includes(q) ||
                (u.name || '').toLowerCase().includes(q)
            );
            renderUsersTable(filtered);
        });

        function applySessionsFilter() {
            const q = document.getElementById('search-sessions').value.toLowerCase();
            const type = document.getElementById('filter-user-type').value;
            
            const filtered = allSessions.filter(s => {
                const matchesSearch = (s.user_email || '').toLowerCase().includes(q) || (s.role || '').toLowerCase().includes(q);
                const matchesType = type === 'ALL' || s.user_role === type;
                return matchesSearch && matchesType;
            });
            renderSessionsTable(filtered);
        }

        document.getElementById('search-sessions').addEventListener('input', applySessionsFilter);
        document.getElementById('filter-user-type').addEventListener('change', applySessionsFilter);

        // ── Refresh ──
        document.getElementById('refresh-btn').addEventListener('click', loadData);

        // ── Add Student ──
        document.getElementById('add-student-btn').addEventListener('click', () => {
            document.getElementById('add-student-modal').style.display = 'flex';
        });

        document.getElementById('add-student-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Creating...';
            btn.disabled = true;

            const reqData = {
                name: document.getElementById('student-name').value,
                email: document.getElementById('student-email').value,
                password: document.getElementById('student-password').value,
                key: ADMIN_KEY
            };

            fetch(`${API_BASE}/api/admin/users`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(reqData)
            })
            .then(res => res.json())
            .then(data => {
                btn.innerHTML = originalText;
                btn.disabled = false;
                if (data.status === 'success') {
                    alert('Student created successfully!');
                    document.getElementById('add-student-modal').style.display = 'none';
                    e.target.reset();
                    loadData();
                } else {
                    alert('Error: ' + data.detail);
                }
            })
            .catch(err => {
                btn.innerHTML = originalText;
                btn.disabled = false;
                alert('Failed to create student. Is the backend running?');
            });
        });

        // ── Delete User ──
        function deleteUser(email) {
            if (!confirm(`Are you sure you want to delete user ${email} and all their interview sessions? This action cannot be undone.`)) return;
            
            fetch(`${API_BASE}/api/admin/users/${encodeURIComponent(email)}?key=${encodeURIComponent(ADMIN_KEY)}`, {
                method: 'DELETE'
            })
            .then(r => r.json())
            .then(data => {
                if (data.status === 'success') {
                    alert('User deleted successfully.');
                    loadData(); // Refresh data
                } else {
                    alert('Error: ' + data.detail);
                }
            })
            .catch(err => alert('Failed to delete user. Make sure backend is running.'));
        }

        // ── Delete Session ──
        function deleteSession(sessionId) {
            if (!confirm('Are you sure you want to delete this interview session?')) return;
            
            fetch(`${API_BASE}/api/admin/sessions/${encodeURIComponent(sessionId)}?key=${encodeURIComponent(ADMIN_KEY)}`, {
                method: 'DELETE'
            })
            .then(r => r.json())
            .then(data => {
                if (data.status === 'success') {
                    alert('Session deleted.');
                    loadData();
                } else {
                    alert('Error: ' + data.detail);
                }
            })
            .catch(err => alert('Failed to delete session.'));
        }

        // ── Report Overview ──
        function showOverview(sessionId) {
            const session = allSessions.find(s => s.id === sessionId);
            if (!session) return;

            let html = `
                <div style="margin-bottom: 20px; display: flex; flex-wrap: wrap; gap: 15px;">
                    <div style="background: #f5f5f5; padding: 10px 15px; border-radius: 8px;"><strong>Candidate:</strong> ${session.user_email}</div>
                    <div style="background: #f5f5f5; padding: 10px 15px; border-radius: 8px;"><strong>Role:</strong> ${session.role}</div>
                    <div style="background: #f5f5f5; padding: 10px 15px; border-radius: 8px;"><strong>Score:</strong> ${session.score}%</div>
                </div>
            `;

            if (session.analysis && session.analysis.summary) {
                html += `
                    <h3 style="margin-bottom:10px; color:var(--navy);">Performance Summary</h3>
                    <div style="background:#fffcf9; padding:20px; border-left:4px solid var(--gold); border-radius:4px; margin-bottom:20px; font-size:15px; white-space:pre-wrap;">${session.analysis.summary}</div>
                `;
            } else {
                html += `<p style="color: #666; font-style: italic;">No summary available.</p>`;
            }

            document.getElementById('overview-content').innerHTML = html;
            document.getElementById('overview-modal').style.display = 'flex';
        }

        // ── Download Report as PDF ──
        function downloadReportAsPDF(sessionId) {
            const session = allSessions.find(s => s.id === sessionId);
            if (!session) {
                alert('Session data not found.');
                return;
            }
            
            // Change button icon to spinner
            const btn = event.currentTarget;
            const icon = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';
            btn.disabled = true;
            
            const container = document.createElement('div');
            container.style.padding = '40px';
            container.style.fontFamily = 'Inter, sans-serif';
            container.style.color = '#1A1A1A';
            
            let html = `
                <h1 style="font-size:24px; color:#1A1A1A; margin-bottom:10px;">MockBee Interview Report</h1>
                <p><strong>Candidate:</strong> ${session.user_email}</p>
                <p><strong>Role:</strong> ${session.role}</p>
                <p><strong>Score:</strong> ${session.score}%</p>
                <p><strong>Date:</strong> ${session.date}</p>
                <hr style="margin:20px 0; border:0; border-top:1px solid #eee;">
            `;
            
            if (session.analysis && session.analysis.summary) {
                html += `
                    <h3 style="font-size:18px; margin-bottom:10px; color:#1A1A1A;">Feedback Summary</h3>
                    <div style="background:#f9f9f9; padding:15px; border-left:4px solid #D8C4B6; margin-bottom:20px; font-size:14px; white-space:pre-wrap;">${session.analysis.summary}</div>
                `;
            }
            
            html += `<h3 style="font-size:18px; margin-bottom:10px; color:#1A1A1A;">Interview Transcript</h3>`;
            
            if (session.transcript && session.transcript.length > 0) {
                session.transcript.forEach(msg => {
                    const isAI = msg.role === 'assistant';
                    html += `
                        <div style="margin-bottom:15px;">
                            <strong style="color:${isAI ? '#B09E93' : '#27AE60'}">${isAI ? 'Interviewer' : 'Candidate'}:</strong>
                            <p style="margin-top:5px; font-size:14px;">${msg.content}</p>
                        </div>
                    `;
                });
            } else {
                html += `<p style="font-size:14px;">No transcript available.</p>`;
            }
            
            container.innerHTML = html;
            
            const safeDate = session.date ? session.date.replace(/[/:]/g, '-') : 'unknown';
            const opt = {
                margin:       0.5,
                filename:     `mockbee_report_${session.user_email}_${safeDate}.pdf`,
                image:        { type: 'jpeg', quality: 0.98 },
                html2canvas:  { scale: 2 },
                jsPDF:        { unit: 'in', format: 'letter', orientation: 'portrait' }
            };
            
            html2pdf().set(opt).from(container).save().then(() => {
                btn.innerHTML = icon;
                btn.disabled = false;
            }).catch(err => {
                alert('PDF generation failed.');
                btn.innerHTML = icon;
                btn.disabled = false;
            });
        }

        // ── Init ──
        loadData();
    </script>
</body>
</html>
