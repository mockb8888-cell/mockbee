<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MockBee — Admin Panel</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --cream-bg: #F9F7F5;
            --cream-dark: #E9E4E2;
            --gold: #D8C4B6;
            --gold-dark: #B09E93;
            --navy: #1A1A1A;
            --navy-dark: #000000;
            --text-dark: #1A1A1A;
            --text-medium: #6B6B6B;
            --green: #27AE60;
            --red: #E53935;
            --yellow: #F2C94C;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--cream-bg);
            color: var(--text-dark);
            min-height: 100vh;
        }

        /* ── Top Bar ── */
        .admin-topbar {
            background: var(--navy);
            color: #fff;
            padding: 16px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
        }

        .admin-topbar .logo-area {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .admin-topbar .logo-area i {
            font-size: 1.5rem;
            color: var(--gold);
        }

        .admin-topbar .logo-area h1 {
            font-size: 1.2rem;
            font-weight: 800;
            letter-spacing: 0.5px;
        }

        .admin-topbar .logo-area h1 span {
            color: var(--gold);
        }

        .admin-topbar .admin-badge {
            background: rgba(216, 196, 182, 0.15);
            border: 1px solid rgba(216, 196, 182, 0.3);
            color: var(--gold);
            padding: 6px 18px;
            border-radius: 50px;
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }

        .admin-topbar .logout-btn {
            background: none;
            border: 1px solid rgba(255,255,255,0.2);
            color: #aaa;
            padding: 8px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 600;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .admin-topbar .logout-btn:hover {
            background: rgba(255,255,255,0.1);
            color: #fff;
            border-color: var(--gold);
        }

        /* ── Stats Row ── */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            padding: 30px 40px 10px;
        }

        .stat-card {
            background: #fff;
            padding: 24px;
            border-radius: 14px;
            border: 1px solid var(--cream-dark);
            display: flex;
            align-items: center;
            gap: 18px;
            transition: all 0.3s;
        }

        .stat-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.06);
            border-color: var(--gold);
        }

        .stat-card .stat-icon {
            width: 52px;
            height: 52px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
        }

        .stat-card .stat-icon.users { background: #EDE7F6; color: #7C4DFF; }
        .stat-card .stat-icon.sessions { background: #E8F5E9; color: #43A047; }
        .stat-card .stat-icon.avg { background: #FFF3E0; color: #FB8C00; }
        .stat-card .stat-icon.active { background: #E3F2FD; color: #1E88E5; }

        .stat-card .stat-text h3 {
            font-size: 1.6rem;
            font-weight: 800;
            line-height: 1;
            margin-bottom: 4px;
        }

        .stat-card .stat-text p {
            font-size: 0.78rem;
            color: var(--text-medium);
            font-weight: 500;
        }

        /* ── Tabs ── */
        .tab-bar {
            display: flex;
            gap: 4px;
            padding: 20px 40px 0;
        }

        .tab-btn {
            padding: 10px 28px;
            border: none;
            background: transparent;
            color: var(--text-medium);
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            border-bottom: 3px solid transparent;
            transition: all 0.3s;
        }

        .tab-btn:hover { color: var(--text-dark); }

        .tab-btn.active {
            color: var(--navy);
            border-bottom-color: var(--gold);
            font-weight: 700;
        }

        /* ── Table Container ── */
        .table-container {
            padding: 16px 40px 40px;
        }

        .table-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .table-header h2 {
            font-size: 1.1rem;
            font-weight: 800;
        }

        .search-box {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #fff;
            border: 1px solid var(--cream-dark);
            border-radius: 8px;
            padding: 8px 16px;
        }

        .search-box i { color: var(--text-medium); font-size: 0.85rem; }

        .search-box input {
            border: none;
            outline: none;
            font-size: 0.85rem;
            font-family: 'Inter', sans-serif;
            background: transparent;
            width: 220px;
        }

        .data-table {
            width: 100%;
            background: #fff;
            border-radius: 14px;
            overflow: hidden;
            border: 1px solid var(--cream-dark);
            border-collapse: collapse;
        }

        .data-table thead {
            background: var(--navy);
            color: #fff;
        }

        .data-table thead th {
            padding: 14px 20px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-align: left;
            white-space: nowrap;
        }

        .data-table tbody tr {
            border-bottom: 1px solid #f0eeec;
            transition: background 0.2s;
        }

        .data-table tbody tr:hover {
            background: rgba(216, 196, 182, 0.08);
        }

        .data-table tbody tr:last-child {
            border-bottom: none;
        }

        .data-table td {
            padding: 14px 20px;
            font-size: 0.82rem;
            color: var(--text-dark);
            white-space: nowrap;
        }

        .data-table td.email-col {
            font-weight: 600;
            color: var(--navy);
        }

        .score-badge {
            display: inline-block;
            padding: 4px 14px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 0.78rem;
        }

        .score-badge.high { background: #E8F5E9; color: #2E7D32; }
        .score-badge.mid { background: #FFF8E1; color: #F57F17; }
        .score-badge.low { background: #FFEBEE; color: #C62828; }
        .score-badge.na { background: #F5F5F5; color: #999; }

        .role-tag {
            background: rgba(216, 196, 182, 0.2);
            color: var(--navy);
            padding: 4px 12px;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .loading-msg {
            text-align: center;
            padding: 60px;
            color: var(--text-medium);
            font-size: 0.9rem;
        }

        .loading-msg i {
            font-size: 2rem;
            color: var(--gold);
            display: block;
            margin-bottom: 12px;
        }

        .empty-state {
            text-align: center;
            padding: 50px;
            color: var(--text-medium);
        }

        .refresh-btn {
            background: var(--gold);
            color: var(--navy);
            border: none;
            padding: 8px 20px;
            border-radius: 8px;
            font-weight: 700;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .refresh-btn:hover {
            background: var(--navy);
            color: var(--gold);
            transform: translateY(-1px);
        }

        @media (max-width: 900px) {
            .stats-row { grid-template-columns: repeat(2, 1fr); padding: 20px; }
            .table-container { padding: 16px 20px; }
            .admin-topbar { padding: 14px 20px; }
        }
    </style>
</head>
<body>

    <!-- Top Bar -->
    <div class="admin-topbar">
        <div class="logo-area">
            <i class="fas fa-shield-halved"></i>
            <h1>Mock<span>Bee</span> Admin</h1>
        </div>
        <span class="admin-badge"><i class="fas fa-lock" style="margin-right:6px"></i> Admin Access</span>
        <button class="logout-btn" id="admin-logout-btn">
            <i class="fas fa-right-from-bracket"></i> Logout
        </button>
    </div>

    <!-- Stats Row -->
    <div class="stats-row">
        <div class="stat-card">
            <div class="stat-icon users"><i class="fas fa-users"></i></div>
            <div class="stat-text">
                <h3 id="total-users">—</h3>
                <p>Total Users</p>
            </div>
        </div>
        <div class="stat-card">
            <div class="stat-icon sessions"><i class="fas fa-clipboard-check"></i></div>
            <div class="stat-text">
                <h3 id="total-sessions">—</h3>
                <p>Interview Sessions</p>
            </div>
        </div>
        <div class="stat-card">
            <div class="stat-icon avg"><i class="fas fa-chart-line"></i></div>
            <div class="stat-text">
                <h3 id="avg-score">—</h3>
                <p>Avg Score</p>
            </div>
        </div>
        <div class="stat-card">
            <div class="stat-icon active"><i class="fas fa-bolt"></i></div>
            <div class="stat-text">
                <h3 id="active-today">—</h3>
                <p>Unique Roles Used</p>
            </div>
        </div>
    </div>

    <!-- Tabs -->
    <div class="tab-bar">
        <button class="tab-btn active" data-tab="users"><i class="fas fa-users" style="margin-right:6px"></i> All Users</button>
        <button class="tab-btn" data-tab="sessions"><i class="fas fa-history" style="margin-right:6px"></i> All Sessions</button>
    </div>

    <!-- Users Table -->
    <div class="table-container" id="tab-users">
        <div class="table-header">
            <h2><i class="fas fa-user-group" style="color:var(--gold-dark);margin-right:8px"></i>Registered Users</h2>
            <div style="display:flex;gap:10px;align-items:center">
                <div class="search-box">
                    <i class="fas fa-search"></i>
                    <input type="text" id="search-users" placeholder="Search by email or name...">
                </div>
                <button class="refresh-btn" id="refresh-btn"><i class="fas fa-rotate"></i> Refresh</button>
            </div>
        </div>
        <div id="users-table-wrap">
            <div class="loading-msg"><i class="fas fa-spinner fa-spin"></i>Loading users...</div>
        </div>
    </div>

    <!-- Sessions Table -->
    <div class="table-container" id="tab-sessions" style="display:none">
        <div class="table-header">
            <h2><i class="fas fa-clipboard-list" style="color:var(--gold-dark);margin-right:8px"></i>Interview Sessions</h2>
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" id="search-sessions" placeholder="Search by email or role...">
            </div>
        </div>
        <div id="sessions-table-wrap">
            <div class="loading-msg"><i class="fas fa-spinner fa-spin"></i>Loading sessions...</div>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script>
        const ADMIN_KEY = 'mockb@urban';
        let allUsers = [];
        let allSessions = [];

        // ── Auth Check ──
        if (localStorage.getItem('mockbee_is_admin') !== 'true') {
            alert('Access Denied. Admin only.');
            window.location.href = 'login.html';
        }

        // ── Logout ──
        document.getElementById('admin-logout-btn').addEventListener('click', () => {
            localStorage.removeItem('mockbee_user_name');
            localStorage.removeItem('mockbee_user_email');
            localStorage.removeItem('mockbee_is_admin');
            window.location.href = 'login.html';
        });

        // ── Tabs ──
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                const tab = btn.getAttribute('data-tab');
                document.getElementById('tab-users').style.display = tab === 'users' ? 'block' : 'none';
                document.getElementById('tab-sessions').style.display = tab === 'sessions' ? 'block' : 'none';
            });
        });

        // ── Fetch Data ──
        function loadData() {
            // Fetch users
            fetch(`${API_BASE}/api/admin/users?key=${encodeURIComponent(ADMIN_KEY)}`)
                .then(r => r.json())
                .then(data => {
                    if (data.status === 'success') {
                        allUsers = data.users;
                        renderUsersTable(allUsers);
                        document.getElementById('total-users').textContent = allUsers.length;
                    }
                })
                .catch(err => {
                    document.getElementById('users-table-wrap').innerHTML = '<div class="empty-state">Failed to load users. Is the backend running?</div>';
                });

            // Fetch sessions
            fetch(`${API_BASE}/api/admin/sessions?key=${encodeURIComponent(ADMIN_KEY)}`)
                .then(r => r.json())
                .then(data => {
                    if (data.status === 'success') {
                        allSessions = data.sessions;
                        renderSessionsTable(allSessions);
                        document.getElementById('total-sessions').textContent = allSessions.length;

                        // Avg score
                        const scored = allSessions.filter(s => s.score);
                        if (scored.length > 0) {
                            const avg = Math.round(scored.reduce((a, s) => a + s.score, 0) / scored.length);
                            document.getElementById('avg-score').textContent = avg + '%';
                        } else {
                            document.getElementById('avg-score').textContent = '—';
                        }

                        // Unique roles
                        const roles = new Set(allSessions.map(s => s.role));
                        document.getElementById('active-today').textContent = roles.size;
                    }
                })
                .catch(err => {
                    document.getElementById('sessions-table-wrap').innerHTML = '<div class="empty-state">Failed to load sessions.</div>';
                });
        }

        // ── Render Users ──
        function renderUsersTable(users) {
            const wrap = document.getElementById('users-table-wrap');
            if (!users.length) {
                wrap.innerHTML = '<div class="empty-state">No registered users yet.</div>';
                return;
            }

            let html = `<table class="data-table">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Email</th>
                        <th>Name</th>
                        <th>Created</th>
                        <th>Last Seen</th>
                    </tr>
                </thead>
                <tbody>`;

            users.forEach((u, i) => {
                const created = u.created_at ? new Date(u.created_at).toLocaleDateString() : '—';
                const lastSeen = u.last_seen ? new Date(u.last_seen).toLocaleDateString() : '—';
                html += `<tr>
                    <td>${i + 1}</td>
                    <td class="email-col">${u.email}</td>
                    <td>${u.name || '—'}</td>
                    <td>${created}</td>
                    <td>${lastSeen}</td>
                </tr>`;
            });

            html += '</tbody></table>';
            wrap.innerHTML = html;
        }

        // ── Render Sessions ──
        function renderSessionsTable(sessions) {
            const wrap = document.getElementById('sessions-table-wrap');
            if (!sessions.length) {
                wrap.innerHTML = '<div class="empty-state">No interview sessions recorded yet.</div>';
                return;
            }

            let html = `<table class="data-table">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>User Email</th>
                        <th>Role</th>
                        <th>Mode</th>
                        <th>Score</th>
                        <th>Date</th>
                        <th>Saved At</th>
                    </tr>
                </thead>
                <tbody>`;

            sessions.forEach((s, i) => {
                const score = s.score || s.score === 0 ? s.score : null;
                let badgeClass = 'na';
                let badgeText = '—';
                if (score !== null) {
                    badgeText = score + '%';
                    if (score >= 75) badgeClass = 'high';
                    else if (score >= 50) badgeClass = 'mid';
                    else badgeClass = 'low';
                }

                const date = s.date || '—';
                const savedAt = s.saved_at ? new Date(s.saved_at).toLocaleString() : '—';

                html += `<tr>
                    <td>${i + 1}</td>
                    <td class="email-col">${s.user_email || '—'}</td>
                    <td><span class="role-tag">${s.role || '—'}</span></td>
                    <td>${s.mode || 'standard'}</td>
                    <td><span class="score-badge ${badgeClass}">${badgeText}</span></td>
                    <td>${date}</td>
                    <td>${savedAt}</td>
                </tr>`;
            });

            html += '</tbody></table>';
            wrap.innerHTML = html;
        }

        // ── Search ──
        document.getElementById('search-users').addEventListener('input', (e) => {
            const q = e.target.value.toLowerCase();
            const filtered = allUsers.filter(u =>
                (u.email || '').toLowerCase().includes(q) ||
                (u.name || '').toLowerCase().includes(q)
            );
            renderUsersTable(filtered);
        });

        document.getElementById('search-sessions').addEventListener('input', (e) => {
            const q = e.target.value.toLowerCase();
            const filtered = allSessions.filter(s =>
                (s.user_email || '').toLowerCase().includes(q) ||
                (s.role || '').toLowerCase().includes(q)
            );
            renderSessionsTable(filtered);
        });

        // ── Refresh ──
        document.getElementById('refresh-btn').addEventListener('click', loadData);

        // ── Init ──
        loadData();
    </script>
</body>
</html>
