<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Company Practice - MockBee</title>
    <!-- Google Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <link href="https://api.fontshare.com/v2/css?f[]=satoshi@900,700,500,300,400&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- CSS -->
    <link rel="stylesheet" href="css/interview.css">
    <style>
        :root {
            --navy: #1A1A1A;
            --gold: #D8C4B6;
        }

        body {
            background-color: #f0f2f5;
        }

        .interview-header {
            background: #fff;
            border-bottom: 3px solid var(--navy);
        }

        .company-tag {
            background: var(--navy);
            color: var(--gold);
            padding: 4px 10px;
            border-radius: 6px;
            font-weight: 800;
            font-size: 0.7rem;
            margin-bottom: 5px;
            display: inline-block;
        }

        .back-link {
            width: auto !important;
            height: 38px !important;
            border-radius: 50px !important;
            padding: 0 18px !important;
            gap: 8px;
            font-weight: 700 !important;
        }
    </style>
</head>

<body>
    <div class="interview-page">
        <!-- Header -->
        <header class="interview-header">
            <div class="header-left">
                <a href="javascript:history.back()" class="back-link"><i class="fas fa-arrow-left"></i> Exit</a>
            </div>
            <div class="header-center">
                <div class="role-badge">
                    <div class="role-info">
                        <span class="company-tag" id="company-tag">LOADING...</span>
                        <h1 id="role-title">Technical Interview</h1>
                    </div>
                </div>
            </div>
            <div class="header-right">
                <div class="progress-container">
                    <div class="progress-text"><span id="current-q">1</span> / <span id="total-q">10</span></div>
                    <div class="progress-bar-bg">
                        <div class="progress-bar-fill" style="width: 10%;"></div>
                    </div>
                </div>
            </div>
        </header>

        <div class="interview-main">
            <main class="chat-container" id="chat-box"></main>
            <aside class="mascot-sidebar">
                <div class="mascot-interviewer">
                    <div class="mascot-interviewer__label">Company Expert</div>
                    <img src="images/ChatGPT Image Mar 30, 2026, 10_43_13 AM.png" alt="Mascot" class="large-mascot">
                </div>
            </aside>
        </div>

        <footer class="input-area">
            <div class="input-container">
                <div class="input-wrapper">
                    <input type="text" id="user-input" placeholder="Your technical answer..." autocomplete="off">
                    <button class="mic-btn"><i class="fas fa-microphone"></i></button>
                    <button id="submit-btn" class="submit-btn">Submit &rarr;</button>
                </div>
            </div>
        </footer>
    </div>

    <!-- Scripts -->
    <script src="js/config.js"></script>
    <script src="js/company-questions.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const company = urlParams.get('company') || "Google";
        const topic = urlParams.get('topic') || "";

        document.getElementById('company-tag').innerText = company.toUpperCase() + " PREP";
        document.getElementById('role-title').innerText = `${topic || 'Company'} Interview`;

        let currentQIndex = 0;
        let questions = [];
        document.getElementById('total-q').innerText = '0';

        function sendMsg(text, type = 'ai') {
            const box = document.getElementById('chat-box');
            const div = document.createElement('div');
            div.className = `message message--${type}`;
            div.innerHTML = `<div class="${type}-bubble">${text}</div>`;
            box.appendChild(div);
            box.scrollTop = box.scrollHeight;
        }

        function askQ() {
            if (currentQIndex < questions.length) {
                sendMsg(`**Q${currentQIndex + 1}:** ${questions[currentQIndex].question}`);
            } else {
                sendMsg("**Success!** You've completed the specialized practice for this topic. Generate your report to see performance details.");
            }
        }

        document.addEventListener('DOMContentLoaded', async () => {
            sendMsg(`Welcome to the **${company}** technical assessment${topic ? ` for **${topic}**` : ''}. We will cover real-world patterns from previous years.`);
            await loadQuestions();
            updateProgress();
            setTimeout(askQ, 800);
        });

        async function loadQuestions() {
            const endpoint = `${API_BASE}/api/company-prep/questions?company=${encodeURIComponent(company)}${topic ? `&topic=${encodeURIComponent(topic)}` : ''}&v=${Date.now()}`;
            try {
                const response = await fetch(endpoint);
                if (!response.ok) throw new Error('Unable to load company questions');
                const payload = await response.json();
                const topics = payload.topics || {};
                const source = topic && topics[topic]
                    ? topics[topic]
                    : Object.values(topics).flat();
                questions = source
                    .filter(item => item && item.question)
                    .slice(0, 20);
            } catch (err) {
                const fallbackTopic = topic || Object.keys(COMPANY_DATA[company] || {})[0];
                questions = (COMPANY_DATA[company] && COMPANY_DATA[company][fallbackTopic])
                    ? COMPANY_DATA[company][fallbackTopic]
                    : [];
            }

            document.getElementById('total-q').innerText = questions.length || 0;
            if (questions.length === 0) {
                sendMsg("I couldn't load questions for this company yet. Please make sure the backend server is running and try again.");
            }
        }

        document.getElementById('submit-btn').addEventListener('click', () => {
            if (currentQIndex >= questions.length) return;

            const input = document.getElementById('user-input');
            const val = input.value.trim();
            if (!val) return;
            sendMsg(val, 'user');
            input.value = "";
            currentQIndex++;
            
            if (currentQIndex >= questions.length) {
                const inputArea = document.querySelector('.input-area');
                if (inputArea) {
                    inputArea.style.opacity = "0";
                    inputArea.style.pointerEvents = "none";
                    inputArea.style.display = "none";
                }
            }

            setTimeout(askQ, 1000);
            updateProgress();
        });

        function updateProgress() {
            const percent = questions.length ? ((currentQIndex) / questions.length) * 100 : 0;
            document.querySelector('.progress-bar-fill').style.width = percent + "%";
            document.getElementById('current-q').innerText = questions.length ? Math.min(currentQIndex + 1, questions.length) : 0;
        }
    </script>
</body>

</html>
